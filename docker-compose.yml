version: '3.8'

services:

  # ── 1. MySQL Database ───────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: time-tracker
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: manar
      MYSQL_PASSWORD: manar21
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
  redis:
    image: redis:alpine
    container_name: redis_cache
    restart: unless-stopped
    networks:
      - app-network
  backend:
    build:
      context: ./backend
    container_name: laravel_app
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh /var/www/html/start.sh
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    container_name: vue_app
    restart: unless-stopped
    networks:
      - app-network

volumes:
  db_data:


networks:
  app-network:
    driver: bridge