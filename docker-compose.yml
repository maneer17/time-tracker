version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped        
    environment:
      MYSQL_DATABASE: time-tracker
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: manar
      MYSQL_PASSWORD: manar21
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: redis_cache
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend           
    container_name: laravel_app
    restart: unless-stopped
    volumes:
      # Sync your local backend/ folder with the container.
      # Code changes on your machine instantly reflect in the container.
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env             
    depends_on:
      - db                         
      - redis 
    command: >
      sh -c "chown -R www-data:www-data /var/www/html/storage
      && chown -R www-data:www-data /var/www/html/bootstrap/cache
      && php-fpm"

    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend         
    container_name: vue_app
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - app-network

volumes:
  db_data:   

networks:
  app-network:
    driver: bridge